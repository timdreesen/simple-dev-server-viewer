name: Bug report
description: Report incorrect discovery, controls, or interface behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows 10, Windows 11, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the server command, expected result, and actual result.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
